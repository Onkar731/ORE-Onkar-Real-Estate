{% load static %}
<!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
    <div class="container">
      <a class="navbar-brand" href="{% url 'pages:index' %}">
        <img src="{% static 'img/ORE_logo.png' %}" class="logo" alt="ORE Logo">
      </a>
      <button class="navbar-toggler" type="button" data-toggle="collapse" data-target="#navbarNavAltMarkup">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
        <ul class="navbar-nav">

          <li
           class=
           {% if '/' == request.path %} 
           "nav-item active mr-3"
           {% else %}
            "nav-item  mr-3"
           {% endif %}
          >
            <a class="nav-link" href="{% url 'pages:index' %}">Home</a>
          </li>
          <li
           class=
           {% if 'about' in request.path %} 
           "nav-item active mr-3"
           {% else %}
            "nav-item  mr-3"
           {% endif %}
          >
            <a class="nav-link" href="{% url 'pages:about' %}">About</a>
          </li>
          <li
           class=
           {% if 'listings' in request.path %} 
           "nav-item active mr-3"
           {% else %}
            "nav-item  mr-3"
           {% endif %}
          >
            <a class="nav-link" href="{% url 'listings:listings' %}">Featured Listings</a>
          </li>
        </ul>
        <ul class="navbar-nav ml-auto">
          {% if not user.is_authenticated %}
            <li class="nav-item mr-3">
              <a class="nav-link" href="{% url 'accounts:register' %}">
                <i class="fas fa-user-plus"></i> Register</a>
            </li>
            <li class="nav-item mr-3">
              <a class="nav-link" href="{% url 'accounts:login' %}">
                <i class="fas fa-sign-in-alt"></i>
                Login</a>
            </li>
          {% else %}
            <li class="nav-item mr-3">
              <a class="nav-link active" href="{% url 'accounts:dashboard' %}">
                <i class="fas fa-solid fa-chart-bar"></i>
                Dashboard | {{request.user}}</a>
            </li>
            <li class="nav-item mr-3">
              <form id="logout" action="{% url 'accounts:logout' %}" method="POST">
                {% csrf_token %}
                <input type="hidden">
                <a class="nav-link" href="javascript:{document.getElementById('logout').submit()}">
                  <i class="fas fa-sign-out-alt"></i>
                  Logout</a>
              </form>
            </li>
          {% endif %}
        </ul>
      </div>
    </div>
  </nav>
