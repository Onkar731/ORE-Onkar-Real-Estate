{% extends "base/base.html" %}

{% block title %}
Real Estate | Login
{% endblock title %}

{% block content %}
  <section id="login" class="bg-light py-5 my-4 d-flex flex-column min-vh-100">
    <div class="container mb-5 p-2">
      <div class="row">
        <div class="col-md-6 mx-auto">
          <div class="card">
            <div class="card-header bg-primary text-white text-center">
              <h4>
                <i class="fas fa-sign-in-alt"></i> Login</h4>
            </div>
            <div class="card-body">
              <!--Alerts-->
              {% include "components/_message.html" %}
              <form action="{% url 'accounts:login' %}" method='POST'>
                {% csrf_token %}
                <div class="form-group">
                  <label for="username">Username</label>
                  <input type="text" name="username" class="form-control" required>
                </div>

                <div class="form-group">
                  <label for="password2">Password</label>
                  <input type="password" name="password" class="form-control" required>
                </div>
                <input type="submit" value="Login" class="btn btn-secondary btn-block">
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
{% endblock content %}
